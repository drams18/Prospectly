<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Créer un compte — Prospectly</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <div class="container auth-container">
    <header>
      <div class="auth-logo">
        <div class="auth-logo-icon">🎯</div>
        <h1>Prospectly</h1>
      </div>
      <p>Créez votre compte pour commencer </p>
    </header>

    <form id="registerForm" class="auth-form">
      <div id="authError" class="auth-error hidden"></div>

      <div class="form-field">
        <label for="username">Nom d'utilisateur</label>
        <input id="username" type="text" autocomplete="username" autocorrect="off" autocapitalize="none" required />
      </div>

      <div class="form-field">
        <label for="password">Mot de passe <span class="field-hint">(min. 6 caractères)</span></label>
        <input id="password" type="password" autocomplete="new-password" required minlength="6" />
      </div>

      <div class="form-field">
        <label for="startAddress">Adresse de référence <span class="field-hint">(pour calcul des distances)</span></label>
        <input id="startAddress" type="text" placeholder="Votre adresse (ex: 75011 Paris)" autocomplete="off" required />
        <div id="address-autocomplete-dropdown" class="autocomplete-dropdown hidden"></div>
      </div>

      <button type="submit" id="submitBtn">Créer le compte</button>

      <p class="auth-switch">Déjà un compte ? <a href="login.html">Se connecter</a></p>
    </form>
  </div>

  <script src="auth.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (typeof Auth !== 'undefined' && Auth.getToken() && window.location.pathname.includes('register')) {
        window.location.replace('index.html');
      }

      const form = document.getElementById('registerForm');
      const errorEl = document.getElementById('authError');
      const submitBtn = document.getElementById('submitBtn');
      const startAddressInput = document.getElementById('startAddress');
      const dropdown = document.getElementById('address-autocomplete-dropdown');
      let selectedAddress = null;

      function escape(str) {
        return String(str ?? '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function highlightMatch(text, query) {
        if (!query) return escape(text);
        const idx = text.toLowerCase().indexOf(query.toLowerCase());
        if (idx === -1) return escape(text);
        return escape(text.slice(0, idx))
          + `<mark class="ac-highlight">${escape(text.slice(idx, idx + query.length))}</mark>`
          + escape(text.slice(idx + query.length));
      }

      function initAddressAutocomplete() {
        const autocompleteService = new google.maps.places.AutocompleteService();
        const placesService = new google.maps.places.PlacesService(document.createElement('div'));
        const IDF_CENTER = new google.maps.LatLng(48.8566, 2.3522);
        let debounce = null;

        startAddressInput.addEventListener('input', () => {
          const query = startAddressInput.value.trim();
          if (!query) {
            dropdown.classList.add('hidden');
            selectedAddress = null;
            return;
          }

          clearTimeout(debounce);
          debounce = setTimeout(() => {
            autocompleteService.getPlacePredictions(
              {
                input: query,
                location: IDF_CENTER,
                radius: 80000,
                componentRestrictions: { country: 'fr' },
                types: ['address']
              },
              (predictions, status) => {
                const preds = (status === google.maps.places.PlacesServiceStatus.OK && predictions) ? predictions : [];
                renderDropdown(preds, query);
              }
            );
          }, 300);
        });

        function renderDropdown(predictions, query) {
          dropdown.innerHTML = '';
          if (!predictions.length) {
            dropdown.classList.add('hidden');
            return;
          }

          predictions.slice(0, 5).forEach((pred) => {
            const item = document.createElement('div');
            item.className = 'autocomplete-item';
            const mainText = pred.structured_formatting?.main_text ?? pred.description;
            const secText = pred.structured_formatting?.secondary_text ?? '';
            item.innerHTML = `
              <span class="ac-main">${highlightMatch(mainText, query)}</span>
              <span class="ac-secondary">${escape(secText)}</span>
            `;
            item.addEventListener('mousedown', (e) => {
              e.preventDefault();
              selectPrediction(pred);
            });
            dropdown.appendChild(item);
          });

          dropdown.classList.remove('hidden');
        }

        function selectPrediction(pred) {
          startAddressInput.value = pred.description;
          selectedAddress = pred.description;
          dropdown.classList.add('hidden');

          placesService.getDetails(
            { placeId: pred.place_id, fields: ['geometry'] },
            () => {}
          );
        }

        document.addEventListener('click', (e) => {
          if (!e.target.closest('.form-field')) {
            dropdown.classList.add('hidden');
          }
        });
      }

      window.initRegisterAutocomplete = function () {
        initAddressAutocomplete();
      };

      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        errorEl.classList.add('hidden');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Création...';

        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value;
        const start_address = startAddressInput.value.trim();

        if (password.length < 6) {
          errorEl.textContent = 'Le mot de passe doit contenir au moins 6 caractères';
          errorEl.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Créer le compte';
          return;
        }

        if (!start_address) {
          errorEl.textContent = "L'adresse est obligatoire";
          errorEl.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Créer le compte';
          return;
        }

        if (!selectedAddress) {
          errorEl.textContent = "Veuillez sélectionner une adresse dans la liste";
          errorEl.classList.remove('hidden');
          submitBtn.disabled = false;
          submitBtn.textContent = 'Créer le compte';
          return;
        }

        try {
          const res = await fetch(`${API_URL}/auth/register`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password, start_address }),
          });

          let data = null;
          const contentType = res.headers.get('content-type');

          if (contentType && contentType.includes('application/json')) {
            data = await res.json();
          }

          if (!res.ok) {
            errorEl.textContent = data?.error || 'Erreur lors de la création du compte';
            errorEl.classList.remove('hidden');
            return;
          }

          window.location.replace('login.html');
        } catch {
          errorEl.textContent = 'Impossible de contacter le serveur';
          errorEl.classList.remove('hidden');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Créer le compte';
        }
      });
    });
  </script>

  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDu5OU_yf5-KHEWOvLHcfpDlWryJS-gHtk&libraries=places&callback=initRegisterAutocomplete"
    async
    defer
  ></script>
</body>
</html>
