<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prospectly</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>✂ Prospectly</h1>
      <p>Trouvez des barbershops sans site web à prospecter</p>
    </header>

    <div class="search-bar">
      <div class="input-wrapper">
        <input
          id="locationInput"
          type="text"
          placeholder="Paris 18, Lyon, Bordeaux..."
          autofocus
          autocomplete="off"
        />
        <div id="autocomplete-dropdown" class="autocomplete-dropdown hidden"></div>
      </div>
      <button id="searchBtn">Rechercher</button>
    </div>

    <div id="status" class="status hidden"></div>

    <div id="toolbar" class="toolbar hidden">
      <span id="resultCount"></span>
      <button id="downloadBtn">⬇ Download CSV</button>
    </div>

    <div class="results-layout">
      <div id="results" class="results-list"></div>
      <div id="detailPanel" class="detail-panel hidden"></div>
    </div>
  </div>

  <script src="app.js"></script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDu5OU_yf5-KHEWOvLHcfpDlWryJS-gHtk&libraries=places&callback=initAutocomplete"
    async
    defer
  ></script>
</body>
</html>
