<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prospectly</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="auth-bar">
      <span id="usernameDisplay" class="auth-username"></span>
      <a href="profile.html" class="nav-link">Profil</a>
      <a href="parcours.html" class="nav-link">Mon Parcours</a>
      <button id="logoutBtn" class="logout-btn">Déconnexion</button>
    </div>

    <header>
      <h1>Prospectly</h1>
      <p>Choisissez une zone, explorez les opportunités par secteur</p>
    </header>

    <div class="search-bar">
      <form id="searchForm" class="search-row">
        <div class="input-wrapper">
          <input
            id="locationInput"
            type="text"
            placeholder="Ville, quartier, code postal (ex: Paris 11e, Bastille…)"
            autofocus
            autocomplete="off"
          />
          <div id="autocomplete-dropdown" class="autocomplete-dropdown hidden"></div>
        </div>
        <button id="searchBtn" type="submit" disabled>Explorer la zone</button>
      </form>
    </div>

    <div id="status" class="status hidden"></div>

    <div id="toolbar" class="toolbar hidden">
      <span id="resultCount"></span>
      <span id="activeCategoryLabel" class="active-category-label"></span>
    </div>

    <button id="mobileCatsBtn" class="mobile-cats-btn hidden">
      Catégories <span class="mobile-cats-arrow">▾</span>
    </button>

    <div class="app-layout">
      <aside id="categorySidebar" class="category-sidebar hidden"></aside>
      <div class="main-content">
        <div class="results-layout">
          <div id="results" class="results-list"></div>
          <div id="detailPanel" class="detail-panel hidden"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="mobileOverlay" class="mobile-overlay" aria-hidden="true">
    <div class="mobile-overlay-handle"></div>
    <button id="mobileOverlayClose" class="mobile-overlay-close" aria-label="Fermer">✕</button>
    <div id="mobileOverlayContent" class="mobile-overlay-content"></div>
  </div>
  <div id="mobileOverlayBackdrop" class="mobile-overlay-backdrop"></div>

  <script src="auth.js" defer></script>
  <script src="app.js" defer></script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDu5OU_yf5-KHEWOvLHcfpDlWryJS-gHtk&libraries=places&callback=initAutocomplete"
    async
    defer
  ></script>
</body>
</html>
