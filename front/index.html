<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prospectly</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="auth-bar">
      <span id="usernameDisplay" class="auth-username"></span>
      <a href="parcours.html" class="nav-link">Mon Parcours</a>
      <button id="logoutBtn" class="logout-btn">Déconnexion</button>
    </div>

    <header>
      <h1>Prospectly</h1>
      <p>Trouvez des businesses sans site web à prospecter</p>
    </header>

<div class="search-bar">
  <div class="search-row">
    <div class="input-wrapper">
      <input
        id="locationInput"
        type="text"
        placeholder="Localisation (adresse, quartier, 75011, Paris 11e...)"
        autofocus
        autocomplete="off"
      />
      <div id="autocomplete-dropdown" class="autocomplete-dropdown hidden"></div>
    </div>
    <input
      id="queryInput"
      type="text"
      placeholder="Type d'enseigne (restaurant, coiffeur, garage...)"
      class="query-input"
    />
    <datalist id="businessTypeSuggestions">
      <option value="restaurant"></option>
      <option value="coiffeur"></option>
      <option value="garage"></option>
      <option value="boutique"></option>
      <option value="boulangerie"></option>
      <option value="pharmacie"></option>
    </datalist>
    <button id="searchBtn" disabled>Rechercher</button>
  </div>
  <div class="filters-row">
    <label class="filter-inline">
      <input type="checkbox" id="filterNoWebsite" />
      Sans site
    </label>
    <label class="filter-inline">
      Note min
      <input type="number" id="filterMinRating" min="0" max="5" step="0.1" placeholder="0" />
    </label>
    <label class="filter-inline">
      Score min
      <input type="number" id="filterMinScore" min="0" max="100" step="1" placeholder="0" />
    </label>
    <label class="filter-inline">
      Catégorie
      <input type="text" id="filterCategory" placeholder="coiffeur, restaurant..." />
    </label>
  </div>
</div>

    <div id="status" class="status hidden"></div>

    <div id="toolbar" class="toolbar hidden">
      <span id="resultCount"></span>
    </div>

    <div class="results-layout">
      <div id="results" class="results-list"></div>
      <div id="detailPanel" class="detail-panel hidden"></div>
    </div>
  </div>

  <div id="mobileOverlay" class="mobile-overlay" aria-hidden="true">
    <div class="mobile-overlay-handle"></div>
    <button id="mobileOverlayClose" class="mobile-overlay-close" aria-label="Fermer">✕</button>
    <div id="mobileOverlayContent" class="mobile-overlay-content"></div>
  </div>
  <div id="mobileOverlayBackdrop" class="mobile-overlay-backdrop"></div>

  <script src="auth.js"></script>
  <script src="app.js"></script>
  <script
    src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDu5OU_yf5-KHEWOvLHcfpDlWryJS-gHtk&libraries=places&callback=initAutocomplete"
    async
    defer
  ></script>
</body>
</html>
