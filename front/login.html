<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Connexion — Prospectly</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <div class="container auth-container">
    <header>
      <div class="auth-logo">
        <div class="auth-logo-icon">🎯</div>
        <h1>Prospectly</h1>
      </div>
      <p>Connectez-vous pour accéder à vos prospects</p>
    </header>

    <form id="loginForm" class="auth-form">
      <div id="authError" class="auth-error hidden"></div>

      <div class="form-field">
        <label for="username">Nom d'utilisateur</label>
        <input id="username" type="text" autocomplete="username" autocorrect="off" autocapitalize="none" required />
      </div>

      <div class="form-field">
        <label for="password">Mot de passe</label>
        <input id="password" type="password" autocomplete="current-password" required />
      </div>

      <button type="submit" id="submitBtn">Se connecter</button>

      <p class="auth-switch">Pas encore de compte ? <a href="register.html">Créer un compte</a></p>
    </form>
  </div>

  <script src="auth.js"></script>
  <script>
    // Redirect if already logged in
    if (Auth.getToken()) window.location.href = 'index.html';

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('authError');
    const submitBtn = document.getElementById('submitBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Connexion...';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch(`${API_URL}/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
        });

        const data = await res.json();

        if (!res.ok) {
          errorEl.textContent = data.error || 'Erreur de connexion';
          errorEl.classList.remove('hidden');
          return;
        }

        Auth.setSession(data.token, data.username);
        window.location.href = 'index.html';
      } catch {
        errorEl.textContent = 'Impossible de contacter le serveur';
        errorEl.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = 'Se connecter';
      }
    });
  </script>
</body>
</html>
