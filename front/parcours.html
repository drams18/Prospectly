<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Parcours — Prospectly</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="container">

    <div class="auth-bar">
      <a href="index.html" class="nav-link">← Retour</a>
      <span id="usernameDisplay" class="auth-username"></span>
      <a href="profile.html" class="nav-link">Profil</a>
      <button id="logoutBtn" class="logout-btn">Déconnexion</button>
    </div>

    <header>
      <h1>Mon Parcours</h1>
    </header>

    <div id="status" class="status hidden"></div>

    <div class="search-bar">
      <div class="search-row">
        <input id="startAddressInput" type="text" placeholder="Adresse de départ" />
        <button id="saveStartAddressBtn">Sauver</button>
      </div>
    </div>

    <div id="parcoursFilters" class="parcours-filters">
      <button class="filter-btn active" data-status="all">Tous</button>
      <button class="filter-btn" data-status="favorites">⭐ Favoris</button>
      <button class="filter-btn" data-status="done">Fait</button>
      <button class="filter-btn" data-status="not_done">Non fait</button>
    </div>

    <div id="parcoursList" class="parcours-list"></div>
  </div>

  <script src="auth.js"></script>
  <script src="parcours.js"></script>
</body>
</html>
