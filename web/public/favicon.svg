<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#3730a3"/>
    </linearGradient>
    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect width="512" height="512" rx="112" fill="url(#sheen)"/>

  <!-- magnifier glass: lens + handle, reads as "find leads nearby" -->
  <circle cx="216" cy="216" r="92" fill="none" stroke="#ffffff" stroke-width="38"/>
  <line x1="280" y1="280" x2="384" y2="384" stroke="#ffffff" stroke-width="46" stroke-linecap="round"/>

  <!-- target dot inside the lens: the "lead" being pinpointed -->
  <circle cx="216" cy="216" r="26" fill="#ffffff"/>
</svg>
